<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Apple ID</title>
</head>
<script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
<body>

<style type="text/css"> 
input {
  margin: 25px auto 25px auto; 
  padding: auto;
  user-select: none;
  height: 50px;
  width: 300px;
  border-radius: 6px;
  border: none;
  border: 2px solid rgb(13, 152, 245);
  outline: none;
  font-size: 22px;
}

input::placeholder{
  font-size: 23px;
} 

#button {
	font-family: sans-serif;
	font-size: 15px;
	border: 2px solid rgb(20, 139, 250);
	width: 121px;
	height: 50px;
	text-align: center;
	background-color: #0c81ee;
	display: flex;
	color: rgb(255, 255, 255);
	justify-content: center;
	align-items: center;
	cursor: pointer;
	border-radius: 7px;
}

#button:hover {
	color: white;
	background-color: black;
}
</style>

<div>
<div><input type="button" value="获取账号" id="btn" /></div>
<div id="jsonTip"></div>
</div>
</body>
<script type="application/javascript">
        
$("#btn").click(function() {
	var url = "id.json"            					// 申明一个XMLHttpRequest
	var request = new XMLHttpRequest();             		// 设置请求方法与路径
	request.open("get", url);	                		// 不发送数据到服务器
	request.send(null);						//XHR对象获取到返回信息后执行
	request.onload = function () {                  		// 返回状态为200，即为数据获取成功
		if (request.status == 200) {
			var data = JSON.parse(request.responseText);
			console.log(data);                    		//获取jsonTip的div
			var $jsontip = $("#jsonTip");          		//存储数据的变量 
			var strHtml = "<hr>";                       	//清空内容 
			$jsontip.empty();                       	//将获取到的json格式数据遍历到div中
			$.each(data, function(infoIndex, info) {
                        	strHtml += "账号：" + info["id"] + "<br>";
                        	strHtml += "密码：" + info["pwd"] + "<br>";
                        	strHtml += "<hr>"
			})                    				//显示处理后的数据 
			$jsontip.html(strHtml);
		}
	}
})
</script>
</html>
